name: Deploy to Render

on:
  # Trigger manually from the Actions tab
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      confirm:
        description: 'Type "deploy" to confirm'
        required: true

  # Or automatically on every push to main after CI passes
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Only run if the trigger is manual, or if CI succeeded
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'deploy') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Validate confirmation
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm != 'deploy'
        run: |
          echo "::error::Deployment confirmation failed. You must type 'deploy' to confirm."
          exit 1

      # ── Trigger Render Deploy Hook ──────────────────────────────────────────
      - name: Trigger Render deployment
        run: |
          echo "Triggering Render deployment for ${{ github.event.inputs.environment || 'production' }}..."
          RESPONSE=$(curl -sf -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            --max-time 30 \
            -w "\n%{http_code}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          if [ "$HTTP_CODE" -ne 200 ] && [ "$HTTP_CODE" -ne 201 ]; then
            echo "::error::Render deploy hook returned HTTP $HTTP_CODE: $BODY"
            exit 1
          fi

          echo "Deploy triggered successfully. HTTP $HTTP_CODE"
          echo "Response: $BODY"

      # ── Notify Telegram ─────────────────────────────────────────────────────
      - name: Send Telegram deployment notification
        if: success()
        run: |
          MESSAGE="🚀 *Instagram Reels Uploader Deployed*%0A%0A\
          📦 Version: \`${{ github.sha }}\`%0A\
          🌿 Branch: \`${{ github.ref_name }}\`%0A\
          👤 Deployed by: ${{ github.actor }}%0A\
          🕐 Time: $(date -u '+%Y-%m-%d %H:%M UTC')"

          curl -sf "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=Markdown" || echo "Telegram notification failed (non-blocking)"
        continue-on-error: true
